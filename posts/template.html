<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Title — Syntra</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../post.css">
</head>
<body class="post-page">
    <!-- Logo -->
    <a href="../index.html" class="logo-link" aria-label="Back to Syntra">
        <div class="static-logo">
            <div class="observer obs-1">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="currentColor"/></svg>
            </div>
            <div class="observer obs-2">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="currentColor"/></svg>
            </div>
            <div class="observer obs-3">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="currentColor"/></svg>
            </div>
            <div class="observer obs-4">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="currentColor"/></svg>
            </div>
            <div class="center-circle"></div>
            <svg class="center-star" viewBox="0 0 160 160">
                <path d="M80,40 A40,40 0 0,0 120,80 A40,40 0 0,0 80,120 A40,40 0 0,0 40,80 A40,40 0 0,0 80,40 Z" fill="currentColor"/>
            </svg>
        </div>
    </a>

    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>

    <article>
        <header class="post-header">
            <h1 class="post-title">Post Title</h1>
            <div class="post-date">2026-01-01</div>
            <div class="post-links">
                <a class="post-link" href="https://example.com" target="_blank" rel="noopener">Example</a>
            </div>
        </header>

        <div class="post-content">
            <p>Post content goes here.</p>
        </div>
    </article>

    <script src="../theme.js"></script>
</body>
</html>
