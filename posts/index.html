<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntra</title>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <link rel="stylesheet" href="../global.css?v=4">
    <link rel="stylesheet" href="../post.css?v=5">
</head>
<body class="post-page">
    <!-- Logo -->
    <a href="../index.html" class="logo-link" aria-label="Back to Syntra">
        <div class="static-logo">
            <div class="observer obs-1">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="currentColor"/></svg>
            </div>
            <div class="observer obs-2">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="currentColor"/></svg>
            </div>
            <div class="observer obs-3">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="currentColor"/></svg>
            </div>
            <div class="observer obs-4">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="currentColor"/></svg>
            </div>
            <div class="center-circle"></div>
            <svg class="center-star" viewBox="0 0 160 160">
                <path d="M80,40 A40,40 0 0,0 120,80 A40,40 0 0,0 80,120 A40,40 0 0,0 40,80 A40,40 0 0,0 80,40 Z" fill="currentColor"/>
            </svg>
        </div>
    </a>

    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>

    <article>
        <header class="post-header">
            <h1 class="post-title" id="post-title"></h1>
            <div class="post-date" id="post-date"></div>
        </header>
        <div class="post-content" id="post-content">
            <p style="color: var(--text-muted);">Loading...</p>
        </div>
    </article>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../toc.js"></script>
    <script src="../theme.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('p');

        if (!slug) {
            window.location.href = '../index.html';
        }

        function parseFrontmatter(text) {
            const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
            if (!match) return { meta: {}, body: text };

            const meta = {};
            match[1].split('\n').forEach(line => {
                const idx = line.indexOf(':');
                if (idx === -1) return;
                const key = line.slice(0, idx).trim();
                let value = line.slice(idx + 1).trim();
                if (value.startsWith('[') && value.endsWith(']')) {
                    value = value.slice(1, -1).split(',').map(s => s.trim().replace(/^['"]|['"]$/g, ''));
                }
                meta[key] = value;
            });

            return { meta, body: match[2] };
        }

        function loadFile(url) {
            return fetch(url).then(r => {
                if (!r.ok) throw new Error('Not found');
                return r.text();
            }).catch(() => {
                // Fallback for file:// protocol
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', url, true);
                    xhr.onload = () => {
                        if (xhr.responseText) resolve(xhr.responseText);
                        else reject(new Error('Not found'));
                    };
                    xhr.onerror = () => reject(new Error('Not found'));
                    xhr.send();
                });
            });
        }

        loadFile(slug + '.md')
            .then(text => {
                const { meta, body } = parseFrontmatter(text);

                const title = meta.title || slug;
                document.title = title + ' — Syntra';
                document.getElementById('post-title').textContent = title;
                document.getElementById('post-date').textContent = meta.date || '';

                document.getElementById('post-content').innerHTML = marked.parse(body);
                
                // Generate TOC after content is loaded
                if (typeof generateTOC === 'function') generateTOC();
            })
            .catch(() => {
                document.getElementById('post-title').textContent = 'Not Found';
                document.getElementById('post-content').innerHTML =
                    '<p>This post could not be loaded.</p>' +
                    '<p><a href="../index.html">Back to home</a></p>';
            });
    </script>
</body>
</html>
