name: CSS Conformance

on:
  push:
    branches: [main, master]
    paths:
      - '**.html'
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.html'

jobs:
  validate-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check HTML files for correct CSS reference
        run: |
          echo "Checking for HTML files with incorrect CSS paths..."
          ERROR_COUNT=0
          
          # Determine base and head refs based on event type
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
            HEAD_REF="${{ github.event.pull_request.head.sha }}"
          else
            BASE_REF="HEAD~1"
            HEAD_REF="HEAD"
          fi
          
          echo "Comparing $BASE_REF to $HEAD_REF"
          
          for file in $(git diff --name-only "$BASE_REF" "$HEAD_REF" -- '*.html' 2>/dev/null); do
            if [ -f "$file" ]; then
              echo "Checking file: $file"
              
              # Determine expected CSS path based on file location
              case "$file" in
                meta/*)
                  EXPECTED='href="../styles.css"'
                  ;;
                *)
                  EXPECTED='href="styles.css"'
                  ;;
              esac
              
              # Check if file has a link tag but not the correct href
              if grep -q '<link.*stylesheet' "$file"; then
                if ! grep -q "$EXPECTED" "$file"; then
                  echo "ERROR: $file does not reference styles.css correctly"
                  echo "Expected: <link rel=\"stylesheet\" href=\"$EXPECTED\">"
                  echo "Found:"
                  grep -n 'stylesheet' "$file" || true
                  echo "---"
                  ERROR_COUNT=$((ERROR_COUNT + 1))
                fi
              fi
            fi
          done
          
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "$ERROR_COUNT file(s) failed CSS conformance check"
            exit 1
          fi
          
          echo "All HTML files reference styles.css correctly."
